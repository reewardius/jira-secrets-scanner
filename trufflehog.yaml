- name: AWS Access Key ID
  keywords:
  - aws
  regex:
    AWS Access Key ID: '(?<![A-Za-z0-9])(AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}(?![A-Za-z0-9])'
- name: AWS Secret Access Key
  keywords:
  - aws
  regex:
    AWS Secret Access Key: (?i)(aws_secret_access_key|secret_access_key)\s*[=:]\s*[A-Za-z0-9/+=]{40}
- name: AWS API Gateway
  keywords:
  - aws
  regex:
    AWS API Gateway: '[0-9a-z]+\.execute-api\.[a-z]{2}-[a-z]+-[0-9]+\.amazonaws\.com'
- name: AWS S3 Bucket
  keywords:
  - aws
  - s3
  regex:
    AWS S3 Bucket: 's3://[0-9a-z][0-9a-z._-]{2,61}[0-9a-z](/[^\s"''<>]*)?'
- name: AWS MWS Key
  keywords:
  - aws
  regex:
    AWS MWS Key: 'amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
- name: AWS AppSync GraphQL Key
  keywords:
  - aws
  regex:
    AWS AppSync GraphQL Key: 'da2-[a-z0-9]{26}'
- name: AWS RDS Endpoint
  keywords:
  - aws
  - rds
  regex:
